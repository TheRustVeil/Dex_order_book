version: '3.9'

services:
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        # NEXT_PUBLIC_* vars are baked in at build time, not runtime.
        # NEXT_PUBLIC_API_URL must be the address the *browser* can reach:
        # docker-compose publishes backend:3001 → host localhost:3001.
        NEXT_PUBLIC_API_URL: "http://localhost:3001"
        NEXT_PUBLIC_CHAIN_ID: "${NEXT_PUBLIC_CHAIN_ID:-11155111}"
        NEXT_PUBLIC_ORDERBOOK_CONTRACT: "${NEXT_PUBLIC_ORDERBOOK_CONTRACT:-}"
        NEXT_PUBLIC_SETTLEMENT_CONTRACT: "${NEXT_PUBLIC_SETTLEMENT_CONTRACT:-}"
        NEXT_PUBLIC_TOKEN_REGISTRY_CONTRACT: "${NEXT_PUBLIC_TOKEN_REGISTRY_CONTRACT:-}"
        NEXT_PUBLIC_FACTORY_CONTRACT: "${NEXT_PUBLIC_FACTORY_CONTRACT:-}"
        NEXT_PUBLIC_FEE_MANAGER_CONTRACT: "${NEXT_PUBLIC_FEE_MANAGER_CONTRACT:-}"
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dex-network

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - P2P_ENABLED=0
    volumes:
      # Persist the JSON order/trade store across container restarts
      - api_data:/app/packages/api/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - dex-network

  # ── Optional infrastructure ─────────────────────────────────────────────────
  # postgres and redis are kept for future use but the API currently uses a
  # JSON file store (packages/api/src/db/sqlite.ts) and does not connect to them.

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dex
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: dex_orderbook
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dex"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dex-network

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - dex-network

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - dex-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3003:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=dexadmin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - dex-network

volumes:
  api_data:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  dex-network:
    driver: bridge
