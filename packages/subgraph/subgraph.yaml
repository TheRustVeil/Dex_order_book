specVersion: 0.0.5
schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum
    name: OrderBook
    network: sepolia
    source:
      # Updated by scripts/update-subgraph.js after testnet deploy
      address: "0x0000000000000000000000000000000000000000"
      abi: OrderBook
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Order
        - Trade
        - DailyVolume
      abis:
        - name: OrderBook
          file: ./abis/OrderBook.json
      eventHandlers:
        - event: OrderPlaced(indexed bytes32,indexed address,indexed bytes32,uint8,uint256,uint256)
          handler: handleOrderPlaced
        - event: OrderCancelled(indexed bytes32)
          handler: handleOrderCancelled
        - event: TradeExecuted(indexed bytes32,indexed bytes32,uint256,uint256)
          handler: handleTradeExecuted
      file: ./src/orderbook.ts

  - kind: ethereum
    name: Settlement
    network: sepolia
    source:
      address: "0x0d93EBCDd5edb0465a92703CEC75C4F675B3bEf5"
      abi: Settlement
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Settlement
      abis:
        - name: Settlement
          file: ./abis/Settlement.json
      eventHandlers:
        - event: Settled(indexed address,indexed address,indexed address,address,uint256,uint256,uint256)
          handler: handleSettled
      file: ./src/settlement.ts
